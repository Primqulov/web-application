version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ib_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ib_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-ishchibormi}
      HTTP_ADDR: ":8080"
    volumes:
      - avatars:/data/avatars

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ib_bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-ishchibormi}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ib_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-ws://localhost:8080}
      NEXT_PUBLIC_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}

volumes:
  mongo_data:
  avatars:
