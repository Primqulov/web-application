services:
  mongo:
    image: mongo:7
    container_name: ib_mongo
    restart: unless-stopped
    # Xost 27017 da Windows MongoDB xizmati ishlayotgani uchun to'qnashmaslik
    # maqsadida Docker Mongo xostda 27018 ga chiqariladi (ichkarida esa 27017).
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ib_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}
      HTTP_ADDR: ":8080"
      # Prod default'lar. CORS noto'g'ri bo'lsa brauzer frontend so'rovlarini
      # bloklaydi.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ishchibormi.uz}
      # ATAYLAB literal (interpolatsiyasiz): ${VAR:-...} shakli qiymatni .env
      # faylidan parse vaqtida oladi, ya'ni diskda eski dev .env qolgan bo'lsa
      # prod'da APP_ENV=dev + OTP_DEV_RETURN=true (OTP kodini API javobida
      # qaytaradi!) yoqilib qolardi. Bu fayl bilan prod'ni dev rejimga o'tkazib
      # BO'LMAYDI — lokal dev uchun docker-compose.dev.yml overlay'ini ishlating.
      APP_ENV: "production"
      OTP_DEV_RETURN: "false"
      # Google Play review login — .env yo'q bo'lsa HAR DOIM o'chiq.
      # Yoqish faqat ataylab qilingan amal bo'lishi kerak; batafsil izoh
      # .env.example va backend/internal/auth/review.go da.
      REVIEW_LOGIN_ENABLED: ${REVIEW_LOGIN_ENABLED:-false}
      REVIEW_LOGIN_CODE: ${REVIEW_LOGIN_CODE:-}
      REVIEW_LOGIN_EXPIRES_AT: ${REVIEW_LOGIN_EXPIRES_AT:-}
      REVIEW_LOGIN_USER_ID: ${REVIEW_LOGIN_USER_ID:-}
      # Prod EC2'da backend reverse-proxy (TLS) ortida ishlaydi, shuning uchun
      # standart "true": klient IP X-Forwarded-For'dan olinadi (rate-limit
      # har bir foydalanuvchi bo'yicha to'g'ri ishlashi uchun). .env buni
      # override qila oladi (masalan proksisiz sinovda "false").
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      # O'chirilgan hisoblar shuncha kundan keyin butunlay yo'q qilinadi.
      # Foydalanuvchiga /delete-account va /maxfiylik-siyosati sahifalarida
      # aytiladigan muddat bilan bir xil bo'lishi SHART (frontend/lib/retention.ts).
      ACCOUNT_RETENTION_DAYS: ${ACCOUNT_RETENTION_DAYS:-90}
      # Mobil push (FCM). Yoqish uchun: serverda ./secrets/fcm-service-account.json
      # faylini qo'ying (Firebase Console -> Service accounts -> Generate new
      # private key), so'ng pastdagi volume qatorini va shu qatorni oching.
      # Bo'sh qolsa push jimgina o'chiq — API to'liq ishlayveradi.
      # FCM_CREDENTIALS_FILE: /app/secrets/fcm-service-account.json
    volumes:
      - avatars:/data/avatars
      - uploads:/app/data/uploads
      # - ./secrets/fcm-service-account.json:/app/secrets/fcm-service-account.json:ro
    healthcheck:
      # /healthz JSON endpoint. busybox wget (alpine base) exits non-zero on any
      # non-2xx, so the container is "healthy" only once the API actually serves.
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ib_bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}

  # Taklif/shikoyat botlari (foydalanuvchi qabul boti + admin javob boti)
  # bitta jarayonda ishlaydi. Bot image'idagi ikkinchi binardan foydalanadi.
  feedbackbot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ib_feedbackbot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}
    entrypoint: ["/app/feedbackbot"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # MUHIM: NEXT_PUBLIC_* qiymatlari build vaqtida kodga yoziladi, shuning
      # uchun ularni build args sifatida uzatamiz (aks holda localhost qoladi).
      # Default'lar PRODUCTION (ishchibormi.uz) — lokal dev uchun .env ustun
      # keladi (masalan localhost). EC2'da .env bu kalitlarni bermasa, prod
      # qiymatlar ishlatiladi.
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://ishchibormi.uz}
        NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-wss://ishchibormi.uz}
        NEXT_PUBLIC_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-Ishchi_bormi_auth_bot}
    container_name: ib_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://ishchibormi.uz}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-wss://ishchibormi.uz}
      NEXT_PUBLIC_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-Ishchi_bormi_auth_bot}

volumes:
  mongo_data:
  avatars:
  uploads:
