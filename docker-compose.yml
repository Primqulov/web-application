services:
  mongo:
    image: mongo:7
    container_name: ib_mongo
    restart: unless-stopped
    # Xost 27017 da Windows MongoDB xizmati ishlayotgani uchun to'qnashmaslik
    # maqsadida Docker Mongo xostda 27018 ga chiqariladi (ichkarida esa 27017).
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ib_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}
      HTTP_ADDR: ":8080"
    volumes:
      - avatars:/data/avatars
      - uploads:/app/data/uploads

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ib_bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}

  # Taklif/shikoyat botlari (foydalanuvchi qabul boti + admin javob boti)
  # bitta jarayonda ishlaydi. Bot image'idagi ikkinchi binardan foydalanadi.
  feedbackbot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ib_feedbackbot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-ishchibormi}
    entrypoint: ["/app/feedbackbot"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # MUHIM: NEXT_PUBLIC_* qiymatlari build vaqtida kodga yoziladi, shuning
      # uchun ularni build args sifatida uzatamiz (aks holda localhost qoladi).
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
        NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-ws://localhost:8080}
        NEXT_PUBLIC_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    container_name: ib_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-ws://localhost:8080}
      NEXT_PUBLIC_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}

volumes:
  mongo_data:
  avatars:
  uploads:
