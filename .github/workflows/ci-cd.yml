name: CI/CD

# Qachon ishga tushadi:
#  - main branch'ga push bo'lganda  -> test + deploy
#  - Pull Request ochilganda        -> faqat test (deploy yo'q)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Bir vaqtning o'zida faqat bitta deploy ishlasin (eskisi to'xtatiladi)
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # 1) CI: kod sifatini tekshirish (test + lint)
  # ───────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      # --- Go (backend + bot) ---
      - name: Go o'rnatish
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            bot/go.sum

      - name: Backend - vet & test
        working-directory: backend
        run: |
          go vet ./...
          go test ./...

      - name: Bot - vet & test
        working-directory: bot
        run: |
          go vet ./...
          go test ./...

      # --- Frontend (Next.js) ---
      - name: Node o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - install
        working-directory: frontend
        run: npm ci

      - name: Frontend - lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend - build (xatolarni erta tutish uchun)
        working-directory: frontend
        run: npm run build --if-present

  # ───────────────────────────────────────────────
  # 2) CD: EC2 serverga deploy
  #    Faqat main'ga push bo'lganda VA test o'tgandan keyin
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: EC2'ga SSH orqali deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: "20m"
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}

            echo "==> Eng so'nggi kodni tortib olish"
            git fetch --all
            git reset --hard origin/main

            echo "==> Telegram bot sozlamalarini .env ga yozish"
            # MUHIM: .env gitignore qilingan, shuning uchun "git reset --hard"
            # unga tegmaydi. Bot token/username shu yerda o'rnatilmasa, server
            # eski/bo'sh qiymatda qoladi -> bot ishga tushmaydi va login
            # sahifasidagi havola noto'g'ri bo'ladi. Mavjud .env kalitlari
            # (JWT, Mongo va h.k.) saqlanadi, faqat kerakli kalitlar yangilanadi.
            set_env() {
              key="$1"; value="$2"; tmp="$(mktemp)"
              if [ -f .env ]; then grep -v -E "^${key}=" .env > "$tmp" || true; else : > "$tmp"; fi
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" .env
            }

            BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            if [ -z "$BOT_TOKEN" ]; then
              echo "XATO: TELEGRAM_BOT_TOKEN GitHub secret'i o'rnatilmagan."
              echo "Qo'shish: Repo -> Settings -> Secrets and variables -> Actions -> New repository secret."
              exit 1
            fi
            set_env TELEGRAM_BOT_TOKEN "$BOT_TOKEN"
            set_env TELEGRAM_BOT_USERNAME Ishchi_bormi_auth_bot

            echo "==> MongoDB ulanishini .env ga yozish (GitHub secret bo'lsa)"
            # MONGO_URI maxfiy (parol bor) -> faqat GitHub secret orqali keladi,
            # hech qachon repoga yozilmaydi. Secret o'rnatilgan bo'lsa serverdagi
            # .env yangilanadi; bo'lmasa mavjud qiymat saqlanadi (deploy buzilmaydi).
            MONGO_URI_SECRET='${{ secrets.MONGO_URI }}'
            if [ -n "$MONGO_URI_SECRET" ]; then
              set_env MONGO_URI "$MONGO_URI_SECRET"
              MONGO_DB_SECRET='${{ secrets.MONGO_DB }}'
              set_env MONGO_DB "${MONGO_DB_SECRET:-ishchibormi}"
              echo "MONGO_URI .env ga yozildi."
            else
              echo "OGOHLANTIRISH: MONGO_URI secret o'rnatilmagan -> serverdagi mavjud .env qiymati saqlanadi."
            fi

            # ── Qolgan ilova secretlarini .env ga yozish ──────────────────────
            # JWT/BOT_SHARED_SECRET/ADMIN_SEED_PASS/AWS kalitlari ilgari faqat
            # serverdagi .env da qo'lda turardi. Endi ular ham GitHub secretlardan
            # boshqariladi: .env to'liq qayta tiklanadi va rotatsiya = secretni
            # yangilab qayta deploy qilish. MONGO/Telegram mantiqiga TEGILMAGAN.
            #
            # set_env_if_set: secret BO'SH BO'LMAGANDAGINA .env ga yozadi. Bo'sh
            # bo'lsa serverdagi MAVJUD qiymatni saqlaydi (bo'sh qiymat bilan qayta
            # yozib, kalitni yo'q qilib qo'ymaydi). Faqat kalit NOMINI chop etadi
            # — qiymatlar hech qachon log'ga chiqmaydi (ular GitHub tomonidan ham
            # avtomatik maskalanadi). Bu yordamchi mavjud set_env() ustiga quriladi.
            set_env_if_set() {
              key="$1"; value="$2"
              if [ -n "$value" ]; then
                set_env "$key" "$value"
                echo "  $key: yangilandi"
              else
                echo "  $key: secret bo'sh -> serverdagi mavjud .env qiymati saqlandi"
              fi
            }

            echo "==> Ilova secretlarini .env ga yozish (bo'shlari o'tkazib yuboriladi)"
            # Har bir qiymat single-quote ichida uzatiladi (shell kengaytirishidan
            # himoya) va faqat set_env_if_set orqali yoziladi -> qiymat log'ga
            # chiqmaydi va bo'sh secret mavjud qiymatni buzmaydi.
            set_env_if_set JWT_ACCESS_SECRET     '${{ secrets.JWT_ACCESS_SECRET }}'
            set_env_if_set JWT_REFRESH_SECRET    '${{ secrets.JWT_REFRESH_SECRET }}'
            set_env_if_set BOT_SHARED_SECRET     '${{ secrets.BOT_SHARED_SECRET }}'
            set_env_if_set ADMIN_SEED_PASS       '${{ secrets.ADMIN_SEED_PASS }}'
            set_env_if_set AWS_ACCESS_KEY_ID     '${{ secrets.AWS_ACCESS_KEY_ID }}'
            set_env_if_set AWS_SECRET_ACCESS_KEY '${{ secrets.AWS_SECRET_ACCESS_KEY }}'

            echo "==> Server resurslari (debug: build yiqilsa sabab shu yerda ko'rinadi)"
            free -h || true
            df -h / || true
            docker system df || true

            echo "==> Build'dan oldin bo'sh joy uchun eski/dangling image'larni tozalash"
            docker image prune -f || true

            # Build va ishga tushirishni ajratamiz: shunda build xatosi aniq ko'rinadi
            # (masalan frontend Next.js build'i RAM yetmay "Killed" bo'lsa).
            echo "==> Image'larni build qilish"
            docker compose build

            echo "==> Konteynerlarni ishga tushirish"
            docker compose up -d --remove-orphans

            echo "==> Eski image'larni tozalash"
            docker image prune -f || true

            echo "==> Holat"
            docker compose ps
